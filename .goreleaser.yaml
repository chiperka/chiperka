version: 2

builds:
  - binary: chiperka
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X chiperka-cli/cmd.Version={{ .Version }}

archives:
  - format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: chiperka
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://about.chiperka.com"
    description: "Declarative API & integration testing. Write YAML, run against real services."
    license: "MIT"
    install: |
      bin.install "chiperka"
    test: |
      system "#{bin}/chiperka", "--version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
